name: Deploy Stockfolio

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - destroy
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: ap-south-1
  TF_VERSION: '1.5'
  TF_STATE_BUCKET: stockfolio-terraform-state
  TF_DYNAMODB_TABLE: stockfolio-terraform-locks

jobs:
  setup:
    name: Setup AWS Resources
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions

      - name: Create S3 Bucket for Terraform State
        run: |
          # Check if bucket exists, create if not
          if ! aws s3api head-bucket --bucket $TF_STATE_BUCKET 2>/dev/null; then
            echo "Creating S3 bucket: $TF_STATE_BUCKET"
            aws s3 mb s3://$TF_STATE_BUCKET --region $AWS_REGION
            aws s3api put-bucket-versioning \
              --bucket $TF_STATE_BUCKET \
              --versioning-configuration Status=Enabled
            echo "S3 bucket created successfully"
          else
            echo "S3 bucket already exists: $TF_STATE_BUCKET"
          fi

      - name: Create DynamoDB Table for State Locking
        run: |
          # Check if table exists, create if not
          if ! aws dynamodb describe-table --table-name $TF_DYNAMODB_TABLE 2>/dev/null; then
            echo "Creating DynamoDB table: $TF_DYNAMODB_TABLE"
            aws dynamodb create-table \
              --table-name $TF_DYNAMODB_TABLE \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region $AWS_REGION
            echo "DynamoDB table created successfully"
            # Wait for table to be active
            aws dynamodb wait table-exists --table-name $TF_DYNAMODB_TABLE
          else
            echo "DynamoDB table already exists: $TF_DYNAMODB_TABLE"
          fi

      - name: Verify Resources
        run: |
          echo "=== AWS Resources Created ==="
          echo "S3 Bucket: $TF_STATE_BUCKET"
          aws s3api list-buckets --query "Buckets[?Name=='$TF_STATE_BUCKET'].Name" --output text
          echo "DynamoDB Table: $TF_DYNAMODB_TABLE"
          aws dynamodb describe-table --table-name $TF_DYNAMODB_TABLE --query "Table.TableName" --output text

  deploy:
    name: Deploy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: setup
    if: github.event.inputs.action == 'deploy'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_DYNAMODB_TABLE"
        working-directory: terraform/environments/${{ github.event.inputs.environment }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform/environments/${{ github.event.inputs.environment }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/environments/${{ github.event.inputs.environment }}

      - name: Setup kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          mv kubectl /usr/local/bin/
          aws eks update-kubeconfig --name stockfolio-cluster --region ${{ env.AWS_REGION }}

      - name: Deploy Kubernetes
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/deployments/
          kubectl apply -f kubernetes/ingress/

      - name: Wait for Deployments
        run: |
          kubectl wait --for=condition=available --timeout=300s deployment/frontend -n stockfolio || true
          kubectl wait --for=condition=available --timeout=300s deployment/backend -n stockfolio || true

      - name: Get Load Balancer Info
        run: |
          sleep 60
          echo "=== Load Balancer Info ==="
          kubectl get svc -n stockfolio -o wide
          LB_HOST=$(kubectl get svc -n stockfolio -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
          echo ""
          echo "========================================"
          echo "🚀 DEPLOY COMPLETE!"
          echo "========================================"
          echo "Hostname for DuckDNS: $LB_HOST"
          echo "Go to duckdns.org -> stockfolio -> current ip: $LB_HOST"
          echo "Access at: http://stockfolio.duckdns.org"
          echo "========================================"

  destroy:
    name: Destroy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: setup
    if: github.event.inputs.action == 'destroy'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_DYNAMODB_TABLE"
        working-directory: terraform/environments/${{ github.event.inputs.environment }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: terraform/environments/${{ github.event.inputs.environment }}

      - name: Done
        run: echo "✅ ${{ github.event.inputs.environment }} environment destroyed"
