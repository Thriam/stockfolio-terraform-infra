name: Terraform Plan

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  TF_VERSION: '1.5'

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform/environments/dev

      - name: Terraform Init (Dev)
        id: init_dev
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=ap-south-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"
        working-directory: terraform/environments/dev
        continue-on-error: true

      - name: Terraform Validate (Dev)
        id: validate_dev
        run: terraform validate
        working-directory: terraform/environments/dev
        continue-on-error: true

      - name: Terraform Plan (Dev)
        id: plan_dev
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform/environments/dev
        continue-on-error: true

      - name: Post Plan to PR (Dev)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const planOutput = `${{ steps.plan_dev.outputs.stdout }}`;
            const planExitCode = ${{ steps.plan_dev.outputs.exitcode }};
            
            const summary = planExitCode === 0 
              ? '✅ **Terraform Plan Succeeded**\n\n<details><summary>Show Plan</summary>\n\n```\n' + planOutput.substring(0, 65000) + '\n```\n</details>'
              : '❌ **Terraform Plan Failed**\n\n<details><summary>Show Plan</summary>\n\n```\n' + planOutput.substring(0, 65000) + '\n```\n</details>';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Terraform Plan Output (Dev Environment)\n\n' + summary
            });

      - name: Terraform Init (Prod)
        id: init_prod
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=prod/terraform.tfstate" \
            -backend-config="region=ap-south-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"
        working-directory: terraform/environments/prod
        continue-on-error: true

      - name: Terraform Validate (Prod)
        id: validate_prod
        run: terraform validate
        working-directory: terraform/environments/prod
        continue-on-error: true

      - name: Terraform Plan (Prod)
        id: plan_prod
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform/environments/prod
        continue-on-error: true

      - name: Post Plan to PR (Prod)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const planOutput = `${{ steps.plan_prod.outputs.stdout }}`;
            const planExitCode = ${{ steps.plan_prod.outputs.exitcode }};
            
            const summary = planExitCode === 0 
              ? '✅ **Terraform Plan Succeeded**\n\n<details><summary>Show Plan</summary>\n\n```\n' + planOutput.substring(0, 65000) + '\n```\n</details>'
              : '❌ **Terraform Plan Failed**\n\n<details><summary>Show Plan</summary>\n\n```\n' + planOutput.substring(0, 65000) + '\n```\n</details>';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Terraform Plan Output (Prod Environment)\n\n' + summary
            });

      - name: Plan Status Check
        if: github.event_name == 'pull_request'
        run: |
          if [ ${{ steps.plan_dev.outputs.exitcode }} -ne 0 ]; then
            exit 1
          fi
          if [ ${{ steps.plan_prod.outputs.exitcode }} -ne 0 ]; then
            exit 1
          fi

