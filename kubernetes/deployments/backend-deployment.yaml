apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: stockfolio
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: navlipi/stockfolio-backend:latest
        ports:
        - containerPort: 8080
          name: backend
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql.stockfolio.svc.cluster.local:3306/stockdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "root"
        - name: WALLET_SERVICE_URL
          value: "http://wallet:8091"
        - name: MARKET_DATA_BASE_URL
          value: "http://market-data:7666"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: stockfolio
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
    name: backend
  type: ClusterIP

