
apiVersion: apps/v1
kind: Deployment
metadata:
  name: about
  namespace: stockfolio
  labels:
    app: about
spec:
  replicas: 2
  selector:
    matchLabels:
      app: about
  template:
    metadata:
      labels:
        app: about
    spec:
      containers:
      - name: about
        image: navlipi/stockfolio-about:latest
        ports:
        - containerPort: 8090
          name: about
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: about
  namespace: stockfolio
spec:
  selector:
    app: about
  ports:
  - port: 8090
    targetPort: 8090
    name: about
  type: ClusterIP


