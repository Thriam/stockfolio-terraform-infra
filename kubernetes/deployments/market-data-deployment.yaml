
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data
  namespace: stockfolio
  labels:
    app: market-data
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data
  template:
    metadata:
      labels:
        app: market-data
    spec:
      containers:
      - name: market-data
        image: navlipi/stockfolio-market-data:latest
        ports:
        - containerPort: 7666
          name: market-data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 7666
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 7666
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: market-data
  namespace: stockfolio
spec:
  selector:
    app: market-data
  ports:
  - port: 7666
    targetPort: 7666
    name: market-data
  type: ClusterIP


