
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet
  namespace: stockfolio
  labels:
    app: wallet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet
  template:
    metadata:
      labels:
        app: wallet
    spec:
      containers:
      - name: wallet
        image: navlipi/stockfolio-wallet:latest
        ports:
        - containerPort: 8091
          name: wallet
        env:
        - name: DB_HOST
          value: "mysql.stockfolio.svc.cluster.local"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "stockdb"
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: "root"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8091
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8091
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wallet
  namespace: stockfolio
spec:
  selector:
    app: wallet
  ports:
  - port: 8091
    targetPort: 8091
    name: wallet
  type: ClusterIP


