# Complete Cert-Manager Setup for DuckDNS + Let's Encrypt HTTPS
# This file contains everything needed for automatic HTTPS with free Let's Encrypt certificates

# ============================================================================
# PART 1: CERT-MANAGER INSTALLATION (Helm)
# ============================================================================
#
# Run these commands to install cert-manager:
#
# # Add Helm repository
# helm repo add jetstack https://charts.jetstack.io
# helm repo update
#
# # Install cert-manager
# helm install cert-manager jetstack/cert-manager \
#   --namespace cert-manager \
#   --create-namespace \
#   --version v1.13.2 \
#   --set installCRDs=true
#
# ============================================================================

# ============================================================================
# PART 2: CLUSTER ISSUER FOR LET'S ENCRYPT WITH ROUTE53 DNS CHALLENGE
# ============================================================================

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-stockfolio
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    # ⚠️ REPLACE WITH YOUR EMAIL
    email: your-email@example.com
    privateKeySecretRef:
      name: letsencrypt-stockfolio-private-key
    solvers:
    # DNS01 challenge via Route53 (required for DuckDNS)
    - dns01:
        route53:
          region: ap-south-1
          # ⚠️ REPLACE WITH YOUR ROUTE53 HOSTED ZONE ID
          # Get this from Route53 Console > Hosted Zones > Your Zone > Hosted Zone ID
          hostedZoneID: ZXXXXXXXXXXX

---
# Alternative: Staging Issuer (for testing)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-stockfolio-staging
spec:
  acme:
    # Let's Encrypt staging server (rate limits don't apply)
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: your-email@example.com
    privateKeySecretRef:
      name: letsencrypt-stockfolio-staging-private-key
    solvers:
    - dns01:
        route53:
          region: ap-south-1
          hostedZoneID: ZXXXXXXXXXXX

# ============================================================================
# PART 3: INGRESS WITH AUTOMATIC HTTPS
# ============================================================================

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stockfolio-ingress
  namespace: stockfolio
  annotations:
    # AWS ALB Configuration
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-2016-08"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "true"
    
    # Cert-Manager Configuration
    cert-manager.io/cluster-issuer: "letsencrypt-stockfolio"
    cert-manager.io/acme-challenge-type: "dns01"
    
    # External DNS for automatic DuckDNS updates
    external-dns.alpha.kubernetes.io/hostname: "stockfolio.abc123.duckdns.org"
    external-dns.alpha.kubernetes.io/ttl: "300"
    external-dns.alpha.kubernetes.io/aws-weight: "100"
    
spec:
  # TLS Configuration - Cert Manager will automatically create this secret
  tls:
  - hosts:
    - "stockfolio.abc123.duckdns.org"
    secretName: stockfolio-tls-secret
  
  # Routing Rules
  rules:
  - host: "stockfolio.abc123.duckdns.org"
    http:
      paths:
      # Frontend - Root path
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      
      # Backend API
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8080
      
      # Wallet Service
      - path: /wallet
        pathType: Prefix
        backend:
          service:
            name: wallet
            port:
              number: 8091
      
      # About Service
      - path: /about
        pathType: Prefix
        backend:
          service:
            name: about
            port:
              number: 8090
      
      # Market Data Service
      - path: /market-data
        pathType: Prefix
        backend:
          service:
            name: market-data
            port:
              number: 7666

# ============================================================================
# PART 4: VERIFICATION COMMANDS
# ============================================================================
#
# # Check certificate status
# kubectl get certificate -n stockfolio
#
# # Check certificate details
# kubectl describe certificate stockfolio-tls-secret -n stockfolio
#
# # Check cert-manager pods
# kubectl get pods -n cert-manager
#
# # Check cert-manager logs
# kubectl logs -n cert-manager -l app=cert-manager
#
# # Check ingress status
# kubectl get ingress -n stockfolio
#
# # Describe ingress for ALB address
# kubectl describe ingress -n stockfolio
#
# ============================================================================
# PART 5: EXPECTED BEHAVIOR
# ============================================================================
#
# 1. After applying this manifest:
#    - Cert-manager creates a DNS-01 challenge in Route53
#    - Let's Encrypt verifies you own the domain
#    - Certificate is issued and stored in stockfolio-tls-secret
#    - ALB is configured with the certificate
#
# 2. Access your app at:
#    https://stockfolio.abc123.duckdns.org
#
# 3. Certificate auto-renews 30 days before expiration
#
# ============================================================================

